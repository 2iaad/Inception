networks:
  inception:
    name: inception

volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      device: /home/zderfouf/data/mariadb
      o : bind
      type: none
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      device: /home/zderfouf/data/wordpress
      o : bind
      type : none

services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb:42
    volumes:
      - mariadb:/var/lib/mysql
    env_file :
      - .env
    networks :
      - inception
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

  wordpress:
    build:  ./requirements/wordpress
    container_name: wordpress
    image:  wordpress:42
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wordpress:/var/www/wordpress
    env_file :
      - .env
    networks :
      - inception
    restart: always

  nginx:
    build:  ./requirements/nginx
    container_name: nginx
    image:  nginx:42
    depends_on:
      - wordpress
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    restart: always
    ports:
      - "443:443"