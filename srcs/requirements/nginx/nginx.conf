events {}

http {
    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;
        fastcgi_pass wordpress:6666; // not useful

        root /var/www/html;
        index index.html;

        server_name caizane;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
