events {}

http {
    server {
        listen 443 ssl;

        # SSL certs generated in Dockerfile
        ssl_certificate     /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

        # Document root
        root /var/www/html;
        index index.html;

        server_name localhost;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
